version: '3.8'

services:
  web:
    build: .
    container_name: diabetes-predictor
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=development
      - FLASK_APP=app.py
      - SECRET_KEY=dev-secret-key-change-in-production
      - DEBUG=True
    volumes:
      - .:/app
    command: python app.py
    restart: unless-stopped
    networks:
      - diabetes-network

networks:
  diabetes-network:
    driver: bridge
